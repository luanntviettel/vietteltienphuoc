<!DOCTYPE html>
<html lang="vi" x-data="viettelApp()">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viettel Tiên Phước - Đặt hàng & Góp ý</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { viettelRed: '#e60000', viettelTeal: '#008b8b' } } }
        }
    </script>
    <style>[x-cloak] { display: none !important; } .sticky-header { position: sticky; top: 0; z-index: 50; }</style>
</head>
<body :class="{ 'dark': darkMode }" class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-300">

    <header class="bg-viettelRed text-white shadow-lg sticky-header">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center">
            <div class="text-center md:text-left mb-4 md:mb-0">
                <h1 class="text-2xl font-black uppercase tracking-tight">Viettel Khu Vực Tiên Phước</h1>
                <p class="text-sm opacity-90"><i class="fas fa-map-marker-alt mr-2"></i>Số 64 - Đường Huỳnh Thúc Kháng, Xã Tiên Phước, Quảng Nam</p>
                <p class="text-sm font-bold mt-1">Hotline: 02356.33.9999 - 0986.388.777</p>
            </div>
            <div class="bg-white p-2 rounded-lg shadow-inner">
                <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyOTkuNiA3NC4zIj48cGF0aCBmaWxsPSIjZTYwMDAwIiBkPSJNMjUuNyAwaDMuN0wyMC4zIDc0LjNoLTMuN0wwIDBoMy43TDE4LjUgNjguMyAyNS43IDB6bTMzIDU0LjRsNC4xIDUuN2MtNy4yIDkuOC0xNS43IDkuOC0xOC40IDkuOC0xMS4zIDAtMTkuOS03LjYtMTkuOS0yMi43IDAtMTUuMyA5LjktMjIuNyAxOS45LTIyLjcgMTAuNSAwIDE2IDcuNSAxNiAyMi43djIuNGgtMzEuN2MuMyAxMC40IDUuOCAxNi45IDE2IDE2LjkgNS4zIDAgMTAuMS0yLjIgMTQtOS45em0tMTUuMy0zMS4xYy04LjUgMC0xMy41IDUuNi0xNC4zIDEzLjdoMjguNWMtLjYtOC4xLTUuNi0xMy43LTE0LjItMTMuN3ptNTAuMy04LjNoMy43djQ3LjNoLTMuN3YtNDcuM3ptMC0xNS4xaDMuN3YxMS40aC0zLjdWMC4wem0yOS40IDE1LjFoMy43djQ3LjNoLTMuN3YtNDcuM3ptMC0xNS4xaDMuN3YxMS40aC0zLjdWMC4wem01Ni43IDE1LjFoMy43djcuNmwtNC4xLS40Yy04LjUgMC0xNC4xIDUuMy0xNC4xIDEzLjd2MjYuNGgtMy43VjE1LjFoMy43djkuMWMzLjYtNiA4LjYtOS4xIDE0LjUtOS4xem0yOS43IDE1LjFoMTAuOHYzaC0xMC44djI5LjJjMCA1LjIgMS41IDcuOCA2LjEgNy44IDIuMSAwIDMuOC0uMyA0LjYtLjZ2My4xYy0xLjIgLjQtMy40LjctNS45LjctOC4zIDAtOC42LTQuNS04LjYtMTEuMVYxOC4xaC02LjF2LTNoNi4xdi04LjloMy43djguOXptMjIuOSA0MC41YzExIDAgMjAuMi03LjYgMjAuMi0yMi43IDAtMTUuMi05LjMtMjIuNy0yMC4yLTIyLjctMTAuOCAwLTE5IDcuNS0xOSAyMi43IDAgMTUuMiA4LjIgMjIuNyAxOSAyMi43em0wLTQyLjRjOS42IDAgMTYuNCA2LjQgMTYuNCAxOS43IDAgMTIuOC02LjggMTkuNy0xNi40IDE5LjctOS4zIDAtMTUuMy02LjktMTUuMy0xOS43IDAtMTMuMyA2LTM5LjcgMTUuMy0xOS43em00MC42IDQxLjlWMTUuMWgzLjN2NDcuM2gtMy4zeiIvPjwvc3ZnPg==" 
                     alt="Viettel Logo" class="h-10 object-contain">
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8">
        <div class="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow-sm mb-8 flex flex-col md:flex-row gap-4 border border-gray-100">
            <div class="relative flex-grow">
                <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                <input type="text" x-model="searchQuery" placeholder="Tìm xã hoặc tên nhân viên..." 
                       class="w-full pl-10 pr-4 py-2 rounded-xl border dark:bg-gray-700 dark:border-gray-600 outline-none focus:ring-2 focus:ring-viettelRed font-medium">
            </div>
            <select x-model="filterRegion" class="p-2 rounded-xl border dark:bg-gray-700 dark:border-gray-600 font-bold outline-none">
                <option value="">Tất cả cụm xã</option>
                <template x-for="region in regions" :key="region"><option :value="region" x-text="region"></option></template>
            </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <template x-for="staff in filteredStaff" :key="staff.id">
                <div class="bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-lg border-t-8 border-viettelRed hover:shadow-xl transition-shadow">
                    <div class="mb-4">
                        <span class="text-[10px] font-black bg-gray-100 dark:bg-gray-700 px-2 py-1 rounded uppercase tracking-widest text-gray-500" x-text="staff.region"></span>
                        <h3 class="font-black text-xl text-gray-900 dark:text-white mt-1" x-text="staff.newTown"></h3>
                    </div>
                    
                    <div class="bg-gray-50 dark:bg-gray-700/50 p-4 rounded-2xl mb-6">
                        <p class="text-xs font-medium text-gray-500 mb-1 uppercase">Nhân viên phụ trách:</p>
                        <p class="font-black text-lg text-gray-800 dark:text-gray-100 mb-2" x-text="staff.name"></p>
                        <p class="text-2xl font-mono font-black text-viettelTeal tracking-tighter" x-text="staff.phone"></p>
                    </div>

                    <div class="grid grid-cols-3 gap-2">
                        <a :href="'tel:' + staff.phone" class="flex flex-col items-center justify-center bg-green-500 text-white py-3 rounded-2xl font-black shadow-lg shadow-green-100 active:scale-95 transition">
                            <i class="fas fa-phone mb-1"></i><span class="text-[9px]">GỌI ĐIỆN</span>
                        </a>
                        <a :href="'https://zalo.me/' + staff.phone" target="_blank" class="flex flex-col items-center justify-center bg-blue-500 text-white py-3 rounded-2xl font-black shadow-lg shadow-blue-100 active:scale-95 transition">
                            <i class="fas fa-comment-dots mb-1"></i><span class="text-[9px]">ZALO</span>
                        </a>
                        <button @click="openFeedback(staff)" class="flex flex-col items-center justify-center bg-viettelRed text-white py-3 rounded-2xl font-black shadow-lg shadow-red-100 active:scale-95 transition">
                            <i class="fas fa-shopping-cart mb-1"></i><span class="text-[9px]">ĐẶT HÀNG/PHẢN ÁNH</span>
                        </button>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <div x-cloak x-show="modalOpen" class="fixed inset-0 z-[60] flex items-center justify-center p-4">
        <div @click="modalOpen = false" class="fixed inset-0 bg-black/70 backdrop-blur-sm"></div>
        <div class="bg-white dark:bg-gray-800 rounded-3xl w-full max-w-md p-8 relative shadow-2xl border-b-8 border-viettelRed">
            <h2 class="text-2xl font-black mb-2 text-viettelRed uppercase italic">Đặt hàng / Góp ý</h2>
            <p class="text-sm text-gray-500 mb-6">Gửi tới: <span class="font-bold text-viettelTeal" x-text="selectedStaff?.name"></span></p>
            
            <form @submit.prevent="submitFeedback">
                <div class="mb-4">
                    <label class="block text-xs font-black uppercase text-gray-400 mb-1">Họ tên của bạn</label>
                    <input type="text" x-model="clientName" required class="w-full p-3 rounded-xl border dark:bg-gray-700 dark:border-gray-600 outline-none focus:ring-2 focus:ring-viettelRed font-bold">
                </div>
                <div class="mb-4">
                    <label class="block text-xs font-black uppercase text-gray-400 mb-1">Số điện thoại khách hàng</label>
                    <input type="tel" x-model="clientPhone" required placeholder="Số để Viettel gọi lại tư vấn" class="w-full p-3 rounded-xl border dark:bg-gray-700 dark:border-gray-600 outline-none focus:ring-2 focus:ring-viettelRed font-bold">
                </div>
                <div class="mb-6">
                    <label class="block text-xs font-black uppercase text-gray-400 mb-1">Nội dung (Gói cước/Lắp wifi...)</label>
                    <textarea rows="3" x-model="content" required class="w-full p-3 rounded-xl border dark:bg-gray-700 dark:border-gray-600 outline-none focus:ring-2 focus:ring-viettelRed font-medium"></textarea>
                </div>
                <button type="submit" :disabled="isSending" class="w-full py-4 rounded-2xl bg-viettelRed text-white font-black text-lg shadow-xl hover:bg-red-700 transition disabled:bg-gray-400 uppercase tracking-widest">
                    <span x-show="!isSending uppercase">Xác nhận gửi</span>
                    <span x-show="isSending">Đang xử lý dữ liệu...</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        function viettelApp() {
            return {
                darkMode: false, searchQuery: '', filterRegion: '', modalOpen: false, isSending: false,
                selectedStaff: null, clientName: '', clientPhone: '', content: '',
                regions: ['Xã Lãnh Ngọc', 'Xã Sơn Cẩm Hà', 'Xã Thạnh Bình', 'Xã Tiên Phước'],
                staffData: [
                    { id: 1, region: "Xã Lãnh Ngọc", newTown: "Khu vực Tiên Lãnh", name: "Nguyễn Thị Hạnh", phone: "0335831855" },
                    { id: 2, region: "Xã Lãnh Ngọc", newTown: "Khu vực Tiên Ngọc", name: "Nguyễn Thị Bích Thảo", phone: "0969933479" },
                    { id: 3, region: "Xã Lãnh Ngọc", newTown: "Khu vực Tiên Hiệp", name: "Nguyễn Thị Bích Huyền", phone: "0982337725" },
                    { id: 4, region: "Xã Sơn Cẩm Hà", newTown: "Khu vực Tiên Sơn", name: "Phạm Thị Lành", phone: "0868630661" },
                    { id: 5, region: "Xã Sơn Cẩm Hà", newTown: "Khu vực Tiên Cẩm", name: "Phạm Thị Lành", phone: "0868630661" },
                    { id: 6, region: "Xã Sơn Cẩm Hà", newTown: "Khu vực Tiên Hà", name: "Nguyễn Tấn Điệp", phone: "0868630849" },
                    { id: 7, region: "Xã Sơn Cẩm Hà", newTown: "Khu vực Tiên Châu", name: "Phạm Xuân Tùng", phone: "0865276556" },
                    { id: 8, region: "Xã Thạnh Bình", newTown: "Khu vực Tiên Cảnh", name: "Hồ Thị Cúc", phone: "0868630842" },
                    { id: 9, region: "Xã Thạnh Bình", newTown: "Khu vực Tiên Lộc", name: "Đỗ Thị Mỹ Duyên", phone: "0354229211" },
                    { id: 10, region: "Xã Thạnh Bình", newTown: "Khu vực Tiên Lập", name: "Hồ Thị Tiên", phone: "0967462024" },
                    { id: 11, region: "Xã Thạnh Bình", newTown: "Khu vực Tiên An", name: "Hồ Thị Tiên", phone: "0967462024" },
                    { id: 12, region: "Xã Tiên Phước", newTown: "Khu vực Tiên Kỳ", name: "Công Thị Mỹ Nữ", phone: "0868630839" },
                    { id: 13, region: "Xã Tiên Phước", newTown: "Khu vực Tiên Mỹ", name: "Phan Thị Hoài Thu", phone: "0367502173" },
                    { id: 14, region: "Xã Tiên Phước", newTown: "Khu vực Tiên Phong", name: "Trần Vương Yến Ny", phone: "0983072797" },
                    { id: 15, region: "Xã Tiên Phước", newTown: "Khu vực Tiên Thọ", name: "Nguyễn Thị Bích Hà", phone: "0356571575" }
                ],
                get filteredStaff() {
                    return this.staffData.filter(s => {
                        return (s.newTown.toLowerCase().includes(this.searchQuery.toLowerCase()) || s.name.toLowerCase().includes(this.searchQuery.toLowerCase())) &&
                               (this.filterRegion === '' || s.region === this.filterRegion);
                    });
                },
                openFeedback(staff) { this.selectedStaff = staff; this.modalOpen = true; },
                submitFeedback() {
                    this.isSending = true;
                    // DÁN LINK GOOGLE APPS SCRIPT CỦA BẠN VÀO ĐÂY
                    const scriptURL = 'https://script.google.com/macros/s/AKfycbwHNt141AAY2ifuLX9fM3VgVDY0Yj3__amCraU99TontY3yzi2WmX2uMnyBeiDL5_GReg/exec';
                    
                    const data = {
                        clientName: this.clientName,
                        clientPhone: this.clientPhone,
                        content: this.content,
                        staffName: this.selectedStaff.name
                    };

                    fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) })
                    .then(() => {
                        alert('Cảm ơn ' + this.clientName + '! Viettel Tiên Phước đã tiếp nhận thông tin.');
                        this.modalOpen = false;
                        this.clientName = ''; this.clientPhone = ''; this.content = '';
                        this.isSending = false;
                    })
                    .catch(() => {
                        alert('Lỗi kết nối! Bạn vui lòng gọi trực tiếp hotline để được hỗ trợ.');
                        this.isSending = false;
                    });
                }
            }
        }
    </script>
</body>
</html>
